# 사전 준비:
#   1. MariaDB 설치 및 실행
#   2. DB 생성: CREATE DATABASE library_db CHARACTER SET utf8mb4;
#   3. 사용자 권한: GRANT ALL ON library_db.* TO 'root'@'localhost';
